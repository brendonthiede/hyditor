name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without v prefix, e.g. 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Unit tests
        run: npm test

  cargo-test:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libgirepository1.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test -- --test-threads=1

  prepare:
    name: Create draft release
    needs: [frontend-check, cargo-test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve-version.outputs.version }}
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve-version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release with auto-generated notes
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.resolve-version.outputs.version }}
          name: Hyditor v${{ steps.resolve-version.outputs.version }}
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libgirepository1.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Patch version
        shell: python
        run: |
          import json, re

          version = "${{ needs.prepare.outputs.version }}"

          with open("src-tauri/tauri.conf.json") as f:
              conf = json.load(f)
          conf["version"] = version
          with open("src-tauri/tauri.conf.json", "w") as f:
              json.dump(conf, f, indent=2)
              f.write("\n")

          with open("src-tauri/Cargo.toml") as f:
              content = f.read()
          patched = re.sub(
              r'^version = ".*?"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          with open("src-tauri/Cargo.toml", "w") as f:
              f.write(patched)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}

  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Patch version
        shell: python
        run: |
          import json, re

          version = "${{ needs.prepare.outputs.version }}"

          with open("src-tauri/tauri.conf.json") as f:
              conf = json.load(f)
          conf["version"] = version
          with open("src-tauri/tauri.conf.json", "w") as f:
              json.dump(conf, f, indent=2)
              f.write("\n")

          with open("src-tauri/Cargo.toml") as f:
              content = f.read()
          patched = re.sub(
              r'^version = ".*?"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          with open("src-tauri/Cargo.toml", "w") as f:
              f.write(patched)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}

  build-macos:
    name: Build macOS
    needs: prepare
    if: vars.ENABLE_MACOS_BUILD != 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Patch version
        shell: python
        run: |
          import json, re

          version = "${{ needs.prepare.outputs.version }}"

          with open("src-tauri/tauri.conf.json") as f:
              conf = json.load(f)
          conf["version"] = version
          with open("src-tauri/tauri.conf.json", "w") as f:
              json.dump(conf, f, indent=2)
              f.write("\n")

          with open("src-tauri/Cargo.toml") as f:
              content = f.read()
          patched = re.sub(
              r'^version = ".*?"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          with open("src-tauri/Cargo.toml", "w") as f:
              f.write(patched)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
