name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without v prefix, e.g. 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - run: npm ci --no-audit

      - name: Lint
        run: npm run lint

      - name: Generate SvelteKit types
        run: npx svelte-kit sync

      - name: Type check
        run: npm run check

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Unit tests
        run: npm test

  cargo-test:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libgirepository1.0-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Compile Rust tests
        working-directory: src-tauri
        env:
          CARGO_TERM_COLOR: always
        run: cargo test --no-run

      - name: Run Rust tests
        working-directory: src-tauri
        env:
          CARGO_TERM_COLOR: always
        run: cargo test -- --test-threads=1

  prepare:
    name: Create draft release
    needs: [frontend-check, cargo-test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve-version.outputs.version }}
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve-version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release with auto-generated notes
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.resolve-version.outputs.version }}"
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" \
            -f tag_name="$VERSION" \
            -f name="Hyditor $VERSION" \
            -F draft=true \
            -F generate_release_notes=true \
            --jq '.id')
          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - run: npm ci --no-audit

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libgirepository1.0-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Patch version
        shell: python
        run: |
          import json, re

          version = "${{ needs.prepare.outputs.version }}"

          with open("src-tauri/tauri.conf.json") as f:
              conf = json.load(f)
          conf["version"] = version
          with open("src-tauri/tauri.conf.json", "w") as f:
              json.dump(conf, f, indent=2)
              f.write("\n")

          with open("src-tauri/Cargo.toml") as f:
              content = f.read()
          patched = re.sub(
              r'^version = ".*?"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          with open("src-tauri/Cargo.toml", "w") as f:
              f.write(patched)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}

  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - run: npm ci --no-audit

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Patch version
        shell: python
        run: |
          import json, re

          version = "${{ needs.prepare.outputs.version }}"

          with open("src-tauri/tauri.conf.json") as f:
              conf = json.load(f)
          conf["version"] = version
          with open("src-tauri/tauri.conf.json", "w") as f:
              json.dump(conf, f, indent=2)
              f.write("\n")

          with open("src-tauri/Cargo.toml") as f:
              content = f.read()
          patched = re.sub(
              r'^version = ".*?"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          with open("src-tauri/Cargo.toml", "w") as f:
              f.write(patched)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}

  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - run: npm ci --no-audit

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Patch version
        shell: python
        run: |
          import json, re

          version = "${{ needs.prepare.outputs.version }}"

          with open("src-tauri/tauri.conf.json") as f:
              conf = json.load(f)
          conf["version"] = version
          with open("src-tauri/tauri.conf.json", "w") as f:
              json.dump(conf, f, indent=2)
              f.write("\n")

          with open("src-tauri/Cargo.toml") as f:
              content = f.read()
          patched = re.sub(
              r'^version = ".*?"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          with open("src-tauri/Cargo.toml", "w") as f:
              f.write(patched)

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}

  publish:
    name: Publish release
    needs: [prepare, build-linux, build-windows, build-macos]
    if: always() && needs.build-linux.result == 'success' && needs.build-windows.result == 'success' && (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            "repos/${{ github.repository }}/releases/${{ needs.prepare.outputs.release_id }}" \
            -F draft=false \
            -f make_latest=true
